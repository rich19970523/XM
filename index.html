<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温馨自律日程表</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 隐藏滚动条，但保持可滚动（针对较长文本） */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .sticky-note {
            box-shadow: 3px 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .sticky-note:hover {
            box-shadow: 5px 8px 20px rgba(0,0,0,0.12);
        }
        .sticky-note.dragging {
            box-shadow: 8px 12px 25px rgba(0,0,0,0.2);
            opacity: 0.95;
            cursor: grabbing;
            z-index: 50 !important;
        }
        
        /* 时间轴高亮动画 */
        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); border-color: #fdba74; }
            50% { transform: scale(1.02); border-color: #fb923c; }
        }
        .active-schedule-card {
            animation: subtle-pulse 3s infinite ease-in-out;
            background: linear-gradient(to right, #fffaf5, #fff);
            box-shadow: 0 4px 15px rgba(251, 146, 60, 0.15);
        }
        .active-schedule-icon {
            box-shadow: 0 0 0 4px rgba(251, 146, 60, 0.2);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-[#FFFBF5] text-stone-800 font-sans selection:bg-orange-200 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <!-- Header Section -->
        <header class="text-center mb-10 mt-4 relative">
            <h1 class="text-3xl md:text-4xl font-serif text-amber-900 font-bold mb-3">
                🍂 雅思备考与工作温馨自律表
            </h1>
            <p class="text-stone-500 md:text-lg">
                在埃里温的时空里，平衡雅思梦想、高效工作与爱意陪伴。
            </p>
            <div id="current-time-display" class="absolute right-0 top-0 mt-2 mr-4 bg-orange-100 text-orange-800 px-4 py-2 rounded-xl font-mono text-sm shadow-sm border border-orange-200 flex items-center">
                <i data-lucide="clock" class="w-4 h-4 mr-2"></i>
                <span id="time-text">--:--</span>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            
            <!-- Left Column: Schedule Timeline -->
            <div class="xl:col-span-5 space-y-6">
                <h2 class="text-xl font-bold text-stone-700 flex items-center mb-4 border-b border-orange-100 pb-2">
                    <i data-lucide="sun" class="w-5 h-5 mr-2 text-orange-400"></i>
                    每日时序 (动态高亮当前任务)
                </h2>
                
                <div id="schedule-container" class="relative pl-4 border-l-2 border-orange-100 space-y-6">
                    <!-- Schedule items will be injected here by JS -->
                </div>
            </div>

            <!-- Right Column: Tools (Pomodoro & Notes Wall) -->
            <div class="xl:col-span-7 flex flex-col gap-6">
                
                <!-- Pomodoro Timer Card -->
                <div class="bg-gradient-to-br from-amber-50 to-orange-100 rounded-3xl p-6 shadow-sm border border-orange-200 flex-shrink-0">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-amber-900 flex items-center">
                            <i data-lucide="coffee" class="w-5 h-5 mr-2"></i>
                            专属番茄钟
                        </h2>
                        <div class="flex bg-white/50 rounded-full p-1 border border-orange-200/50">
                            <button id="mode-focus-btn" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-orange-400 text-white shadow-sm">
                                雅思冲刺
                            </button>
                            <button id="mode-break-btn" class="px-4 py-1.5 rounded-full text-sm font-medium transition-colors text-orange-800 hover:bg-orange-200/50">
                                留白休息
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row items-center justify-center sm:justify-between py-2 px-8">
                        <div id="timer-display" class="text-6xl md:text-7xl font-mono text-amber-950 font-light tracking-tight mb-4 sm:mb-0 drop-shadow-sm">
                            45:00
                        </div>

                        <div class="flex items-center space-x-4">
                            <button id="toggle-timer-btn" class="w-14 h-14 flex items-center justify-center rounded-full shadow-md text-white transition-transform hover:scale-105 active:scale-95 bg-orange-500">
                                <span id="play-icon-container" class="translate-x-0.5"><i data-lucide="play" class="w-6 h-6 fill-current"></i></span>
                                <span id="pause-icon-container" class="hidden"><i data-lucide="pause" class="w-6 h-6 fill-current"></i></span>
                            </button>
                            <button id="reset-timer-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-white text-orange-800 shadow-sm border border-orange-100 hover:bg-orange-50 transition-colors">
                                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <p id="timer-status-text" class="text-center sm:text-left text-sm text-orange-700/70 mt-2 sm:ml-8">
                        保持专注，为了8分的目标前行。
                    </p>
                </div>

                <!-- Sticky Notes Wall Card -->
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-stone-200 flex-1 flex flex-col min-h-[500px]">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-stone-700 flex items-center">
                            <i data-lucide="sticky-note" class="w-5 h-5 mr-2 text-stone-400"></i>
                            灵感便签墙
                        </h2>
                        <div class="flex items-center gap-3">
                            <span id="save-status" class="text-xs text-stone-400 flex items-center">
                                <i data-lucide="cloud" class="w-3 h-3 mr-1"></i> 已同步
                            </span>
                            <button id="add-note-btn" class="flex items-center px-4 py-2 rounded-xl text-sm font-medium transition-all bg-stone-800 text-white hover:bg-stone-700 shadow-sm active:scale-95">
                                <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 贴一张
                            </button>
                        </div>
                    </div>
                    
                    <!-- Wall Container -->
                    <div id="notes-wall" class="relative flex-1 bg-[#faf8f5] border border-stone-200 rounded-2xl overflow-hidden shadow-inner touch-none bg-[radial-gradient(#d6d3d1_1px,transparent_1px)] [background-size:24px_24px]">
                        <!-- Notes injected here -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Schedule Data & Logic ---
        const scheduleData = [
            { id: 's1', start: 0, end: 10, time: "00:00 - 10:00", title: "深度休息与晨间准备", desc: "拥有长达10个小时的宽裕窗口，安排8-9小时高质量睡眠。悠闲地吃早餐、洗漱，彻底放松。", icon: "moon", color: "text-indigo-500", bg: "bg-indigo-50", border: "border-indigo-100" },
            { id: 's2', start: 10, end: 11, time: "10:00 - 11:00", title: "准备与通勤", desc: "前往工作地点，调整进入专注状态。", icon: "sun", color: "text-amber-500", bg: "bg-amber-50", border: "border-amber-100" },
            { id: 's3', start: 11, end: 14, time: "11:00 - 14:00", title: "雅思核心突击", desc: "优先完成英语提分目标。建议专注45分钟，留白15分钟，保持高强度学习的同时处理紧急消息。", icon: "book-open", color: "text-red-500", bg: "bg-red-50", border: "border-red-100" },
            { id: 's4', start: 14, end: 15, time: "14:00 - 15:00", title: "休息与大脑重启", desc: "吃午餐、闭目养神或散步。彻底离开办公桌，从密集的英语中解脱。", icon: "coffee", color: "text-orange-500", bg: "bg-orange-50", border: "border-orange-100" },
            { id: 's5', start: 15, end: 20, time: "15:00 - 20:00", title: "集中处理工作", desc: "进入纯粹的业务模式，高效输出，专注处理当天的所有工作任务。", icon: "briefcase", color: "text-blue-500", bg: "bg-blue-50", border: "border-blue-100" },
            { id: 's6', start: 20, end: 21, time: "20:00 - 21:00", title: "下班锻炼与通勤", desc: "走路回家。播放英文播客进行无压力的“泛听”，将运动与沉浸式语言环境结合。", icon: "footprints", color: "text-emerald-500", bg: "bg-emerald-50", border: "border-emerald-100" },
            { id: 's7', start: 21, end: 24, time: "21:00 - 24:00", title: "专属陪伴时间", desc: "推开家门后，把工作和备考彻底留在门外，全心全意陪伴女朋友。", icon: "heart", color: "text-pink-500", bg: "bg-pink-50", border: "border-pink-100" },
        ];

        const container = document.getElementById('schedule-container');
        
        // Render Schedule
        scheduleData.forEach(item => {
            const html = `
                <div class="relative transition-all duration-300" id="card-wrapper-${item.id}">
                    <div id="icon-${item.id}" class="absolute -left-[33px] top-1 w-10 h-10 rounded-full ${item.bg} border-4 border-[#FFFBF5] flex items-center justify-center shadow-sm transition-all duration-300 z-10">
                        <i data-lucide="${item.icon}" class="w-4 h-4 ${item.color}"></i>
                    </div>
                    <div id="card-${item.id}" class="ml-6 bg-white rounded-2xl p-5 shadow-sm border border-stone-100 hover:shadow-md transition-all duration-300">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-2 gap-2">
                            <h3 class="text-lg font-bold text-stone-800">${item.title}</h3>
                            <span class="inline-block px-3 py-1 rounded-full text-sm font-medium ${item.bg} ${item.color} w-max">
                                ${item.time}
                            </span>
                        </div>
                        <p class="text-stone-600 leading-relaxed text-sm md:text-base">
                            ${item.desc}
                        </p>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });

        // Initialize Icons
        lucide.createIcons();

        // Update Time and Highlight Logic
        function updateTimeAndHighlight() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const timeFloat = h + (m / 60);
            
            // Format time display
            const timeDisplay = document.getElementById('time-text');
            timeDisplay.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;

            // Highlight current block
            scheduleData.forEach(item => {
                const card = document.getElementById(`card-${item.id}`);
                const icon = document.getElementById(`icon-${item.id}`);
                
                if (timeFloat >= item.start && timeFloat < item.end) {
                    card.classList.add('active-schedule-card');
                    card.classList.remove('border-stone-100');
                    icon.classList.add('active-schedule-icon');
                } else {
                    card.classList.remove('active-schedule-card');
                    card.classList.add('border-stone-100');
                    icon.classList.remove('active-schedule-icon');
                }
            });
        }
        setInterval(updateTimeAndHighlight, 60000); // Check every minute
        updateTimeAndHighlight(); // Initial check


        // --- Pomodoro Logic ---
        const FOCUS_TIME = 45 * 60;
        const BREAK_TIME = 15 * 60;
        let timeLeft = FOCUS_TIME;
        let isActive = false;
        let isFocus = true;
        let timerInterval = null;

        const timerDisplay = document.getElementById('timer-display');
        const toggleTimerBtn = document.getElementById('toggle-timer-btn');
        const resetTimerBtn = document.getElementById('reset-timer-btn');
        const modeFocusBtn = document.getElementById('mode-focus-btn');
        const modeBreakBtn = document.getElementById('mode-break-btn');
        const timerStatusText = document.getElementById('timer-status-text');
        const playIconCont = document.getElementById('play-icon-container');
        const pauseIconCont = document.getElementById('pause-icon-container');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateTimerUI() {
            timerDisplay.textContent = formatTime(timeLeft);
            if (isActive) {
                toggleTimerBtn.classList.remove('bg-orange-500');
                toggleTimerBtn.classList.add('bg-red-400');
                playIconCont.classList.add('hidden');
                pauseIconCont.classList.remove('hidden');
            } else {
                toggleTimerBtn.classList.add('bg-orange-500');
                toggleTimerBtn.classList.remove('bg-red-400');
                playIconCont.classList.remove('hidden');
                pauseIconCont.classList.add('hidden');
            }

            if (isFocus) {
                modeFocusBtn.className = "px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-orange-400 text-white shadow-sm";
                modeBreakBtn.className = "px-4 py-1.5 rounded-full text-sm font-medium transition-colors text-orange-800 hover:bg-orange-200/50";
                timerStatusText.textContent = "保持专注，为了8分的目标前行。";
            } else {
                modeFocusBtn.className = "px-4 py-1.5 rounded-full text-sm font-medium transition-colors text-orange-800 hover:bg-orange-200/50";
                modeBreakBtn.className = "px-4 py-1.5 rounded-full text-sm font-medium transition-colors bg-emerald-400 text-white shadow-sm";
                timerStatusText.textContent = "大脑重启中，喝杯水，站起来活动一下吧。";
            }
        }

        function toggleTimer() {
            isActive = !isActive;
            if (isActive) {
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerUI();
                    } else {
                        clearInterval(timerInterval);
                        isActive = false;
                        isFocus = !isFocus;
                        timeLeft = isFocus ? FOCUS_TIME : BREAK_TIME;
                        updateTimerUI();
                    }
                }, 1000);
            } else {
                clearInterval(timerInterval);
            }
            updateTimerUI();
        }

        function resetTimer() {
            isActive = false;
            clearInterval(timerInterval);
            timeLeft = isFocus ? FOCUS_TIME : BREAK_TIME;
            updateTimerUI();
        }

        function switchMode(mode) {
            isFocus = (mode === 'focus');
            isActive = false;
            clearInterval(timerInterval);
            timeLeft = isFocus ? FOCUS_TIME : BREAK_TIME;
            updateTimerUI();
        }

        toggleTimerBtn.addEventListener('click', toggleTimer);
        resetTimerBtn.addEventListener('click', resetTimer);
        modeFocusBtn.addEventListener('click', () => switchMode('focus'));
        modeBreakBtn.addEventListener('click', () => switchMode('break'));


        // --- Sticky Notes Wall Logic ---
        const wall = document.getElementById('notes-wall');
        const addNoteBtn = document.getElementById('add-note-btn');
        const saveStatus = document.getElementById('save-status');
        
        let notesArray = [];
        const colors = [
            'bg-[#fef08a]', // yellow
            'bg-[#bbf7d0]', // green
            'bg-[#bfdbfe]', // blue
            'bg-[#fbcfe8]', // pink
            'bg-[#e9d5ff]'  // purple
        ];

        // Dragging State
        let dragInfo = null;
        let isEditingNotes = false; 

        function renderNotes() {
            wall.innerHTML = '';
            notesArray.forEach(note => {
                const noteEl = document.createElement('div');
                noteEl.dataset.id = note.id;
                noteEl.className = `sticky-note absolute w-48 h-48 p-4 rounded-lg flex flex-col cursor-grab ${note.color}`;
                noteEl.style.left = `${note.x}px`;
                noteEl.style.top = `${note.y}px`;
                noteEl.style.transform = `rotate(${note.rotation}deg)`;
                
                noteEl.innerHTML = `
                    <div class="drag-handle h-6 w-full flex justify-between items-start -mt-2 -mx-2 pl-4 pr-2 mb-1">
                        <i data-lucide="pin" class="w-5 h-5 text-stone-700/30 opacity-60 ml-[60px] drop-shadow-sm"></i>
                        <button class="delete-note-btn opacity-0 group-hover:opacity-100 hover:bg-black/10 rounded-full p-1 transition-all"><i data-lucide="x" class="w-3 h-3 text-stone-600"></i></button>
                    </div>
                    <textarea class="no-scrollbar flex-1 bg-transparent border-none outline-none resize-none text-[15px] leading-relaxed text-stone-800 placeholder-stone-800/40 cursor-text">${note.text}</textarea>
                `;
                
                noteEl.classList.add('group');
                wall.appendChild(noteEl);
            });
            lucide.createIcons();
        }

        // Add new Note
        addNoteBtn.addEventListener('click', () => {
            const wallRect = wall.getBoundingClientRect();
            // Random position near center
            const x = Math.max(0, (wallRect.width / 2) - 100 + (Math.random() * 60 - 30));
            const y = Math.max(0, (wallRect.height / 2) - 100 + (Math.random() * 60 - 30));
            
            const newNote = {
                id: Date.now().toString(),
                text: '',
                x: parseInt(x),
                y: parseInt(y),
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.floor(Math.random() * 6) - 3 // -3 to 3 degrees
            };
            
            notesArray.push(newNote);
            renderNotes();
            saveNotes();
        });

        // Event Delegation for Wall (Delete, Edit, Drag)
        wall.addEventListener('click', (e) => {
            const delBtn = e.target.closest('.delete-note-btn');
            if (delBtn) {
                const id = delBtn.closest('.sticky-note').dataset.id;
                notesArray = notesArray.filter(n => n.id !== id);
                renderNotes();
                saveNotes();
            }
        });

        wall.addEventListener('input', (e) => {
            if (e.target.tagName === 'TEXTAREA') {
                const id = e.target.closest('.sticky-note').dataset.id;
                const note = notesArray.find(n => n.id === id);
                if (note) {
                    note.text = e.target.value;
                    scheduleSave();
                }
            }
        });

        // Track editing state to pause Firebase snapshots rewriting DOM
        wall.addEventListener('focusin', (e) => {
            if (e.target.tagName === 'TEXTAREA') isEditingNotes = true;
        });
        wall.addEventListener('focusout', (e) => {
            if (e.target.tagName === 'TEXTAREA') {
                isEditingNotes = false;
                saveNotes();
            }
        });

        // Drag & Drop Implementation
        wall.addEventListener('mousedown', (e) => {
            const noteEl = e.target.closest('.sticky-note');
            // Don't drag if clicking textarea or buttons
            if (!noteEl || e.target.tagName === 'TEXTAREA' || e.target.closest('button')) return;
            
            isEditingNotes = true; // Pause syncs during drag
            const wallRect = wall.getBoundingClientRect();
            
            dragInfo = {
                id: noteEl.dataset.id,
                el: noteEl,
                startX: e.clientX,
                startY: e.clientY,
                origX: parseInt(noteEl.style.left) || 0,
                origY: parseInt(noteEl.style.top) || 0,
                wallRect: wallRect
            };
            
            noteEl.classList.add('dragging');
            // Remove rotation while dragging for smoother feel
            noteEl.style.transform = `rotate(0deg)`; 
        });

        document.addEventListener('mousemove', (e) => {
            if (!dragInfo) return;
            e.preventDefault(); // Prevent text selection
            
            const dx = e.clientX - dragInfo.startX;
            const dy = e.clientY - dragInfo.startY;
            let newX = dragInfo.origX + dx;
            let newY = dragInfo.origY + dy;
            
            // Constrain to wall boundaries
            newX = Math.max(0, Math.min(newX, dragInfo.wallRect.width - dragInfo.el.offsetWidth));
            newY = Math.max(0, Math.min(newY, dragInfo.wallRect.height - dragInfo.el.offsetHeight));

            dragInfo.el.style.left = `${newX}px`;
            dragInfo.el.style.top = `${newY}px`;
        });

        document.addEventListener('mouseup', () => {
            if (dragInfo) {
                const note = notesArray.find(n => n.id === dragInfo.id);
                if (note) {
                    note.x = parseInt(dragInfo.el.style.left);
                    note.y = parseInt(dragInfo.el.style.top);
                    // Restore original rotation
                    dragInfo.el.style.transform = `rotate(${note.rotation}deg)`;
                }
                
                dragInfo.el.classList.remove('dragging');
                dragInfo = null;
                isEditingNotes = false;
                saveNotes();
            }
        });


        // --- Firebase Integration ---
        let app, auth, db, appId, currentUser;
        let saveTimeout = null;
        
        try {
            const firebaseConfig = typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : {};
            appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
            
            if (Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (error) {
            console.error("Firebase init error:", error);
        }

        let unsubscribeNotes = null;

        if (auth) {
            const initAuth = async () => {
                try {
                    if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                        await signInWithCustomToken(auth, window.__initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth error:", error);
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user && db) {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'notes', 'sticky_wall');
                    
                    if (unsubscribeNotes) unsubscribeNotes();
                    
                    unsubscribeNotes = onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists() && !isEditingNotes) {
                            const data = docSnap.data();
                            if (data.notes && Array.isArray(data.notes)) {
                                notesArray = data.notes;
                                renderNotes();
                            }
                        }
                    }, (error) => {
                        console.error("Error fetching notes:", error);
                    });
                } else {
                    loadLocalNotes();
                }
            });
        } else {
            loadLocalNotes();
        }

        function loadLocalNotes() {
            const localData = localStorage.getItem('yerevan_sticky_notes');
            if (localData) {
                notesArray = JSON.parse(localData);
            } else {
                // Default welcome note
                notesArray = [{
                    id: '1', text: "欢迎来到埃里温的时区！\n\n拖拽这张便签改变位置，或者点击右上角新增。", 
                    x: 50, y: 50, color: colors[0], rotation: -2
                }];
            }
            renderNotes();
        }

        function scheduleSave() {
            setSaveStatusUI('saving');
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveNotes, 1000); // Debounce typing
        }

        async function saveNotes() {
            setSaveStatusUI('saving');
            try {
                if (currentUser && db) {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'notes', 'sticky_wall');
                    await setDoc(docRef, { notes: notesArray, updatedAt: new Date() }, { merge: true });
                } else {
                    localStorage.setItem('yerevan_sticky_notes', JSON.stringify(notesArray));
                }
                setSaveStatusUI('success');
            } catch (error) {
                console.error("Error saving:", error);
                setSaveStatusUI('error');
            }
        }

        function setSaveStatusUI(state) {
            if (state === 'saving') {
                saveStatus.innerHTML = `<i data-lucide="rotate-cw" class="w-3 h-3 mr-1 animate-spin"></i> 保存中`;
            } else if (state === 'success') {
                saveStatus.innerHTML = `<i data-lucide="check" class="w-3 h-3 mr-1 text-emerald-500"></i> 已同步`;
            } else {
                saveStatus.innerHTML = `<i data-lucide="x" class="w-3 h-3 mr-1 text-red-500"></i> 保存失败`;
            }
            lucide.createIcons();
        }

    </script>
</body>
</html>
